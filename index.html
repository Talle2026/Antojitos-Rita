    <div id="cart-bar"><a id="order-link" href="#">🛒 Enviar pedido por WhatsApp</a></div>

    <script>
        let order = [];
        function add(selectId) {
            let sel = document.getElementById(selectId);
            order.push(sel.value);
            document.getElementById('cart-bar').style.display = 'block';
            updateLink();
        }
        function updateLink() {
            let msg = "¡Hola! Quiero pedir: " + order.join(', ');
            document.getElementById('order-link').href = "https://wa.me/525518446160?text=" + encodeURIComponent(msg);
        }
    </script>
